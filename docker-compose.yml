services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aster
      POSTGRES_PASSWORD: aster
      POSTGRES_DB: aster
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/backend.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/terminal
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:

