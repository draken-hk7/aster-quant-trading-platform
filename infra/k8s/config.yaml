apiVersion: v1
kind: ConfigMap
metadata:
  name: aster-config
  namespace: aster-trading
data:
  ENVIRONMENT: production
  APP_NAME: Aster Quant
  API_HOST: 0.0.0.0
  API_PORT: "8000"
  FRONTEND_ORIGIN: https://terminal.example.com
  DAILY_LOSS_LIMIT: "250000"
  MAX_GROSS_EXPOSURE: "5000000"
  MAX_ORDER_NOTIONAL: "250000"
---
apiVersion: v1
kind: Secret
metadata:
  name: aster-secrets
  namespace: aster-trading
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://replace-me
  REDIS_URL: redis://replace-me
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  JWT_SECRET: replace-with-external-secret-manager

