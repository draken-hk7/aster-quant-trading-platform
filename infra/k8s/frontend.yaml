apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aster-trading
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: aster/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: /api/v1
            - name: NEXT_PUBLIC_WS_URL
              value: /ws/terminal
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: aster-trading
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000

